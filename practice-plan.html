<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surrey 89ers — Practice Plan</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --green:#008348;--green-dark:#005c33;--green-deep:#003d22;--green-dim:rgba(0,131,72,0.15);
  --offwhite:#FAF9F6;--offwhite-mid:rgba(250,249,246,0.6);--muted:rgba(250,249,246,0.4);
  --card:#0f1f16;--card2:#152a1c;--border:rgba(0,131,72,0.2);--border-soft:rgba(250,249,246,0.07);
  --red:#e05555;--amber:#f59e0b;--blue:#60c8fa;
}
body{font-family:'Inter',sans-serif;background:#080f0b;color:var(--offwhite);min-height:100vh}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#002a18 0%,#003d22 50%,#001a0e 100%)}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:48px 40px;width:360px;text-align:center}
.login-logo{width:72px;height:72px;border-radius:50%;margin:0 auto 20px;display:block;object-fit:cover}
.login-title{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--muted);margin-bottom:32px;letter-spacing:1px;text-transform:uppercase}
.login-input{width:100%;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:8px;padding:12px 16px;color:var(--offwhite);font-size:14px;font-family:'Inter',sans-serif;margin-bottom:12px;outline:none}
.login-input:focus{border-color:var(--green)}
.login-btn{width:100%;background:var(--green);border:none;border-radius:8px;padding:13px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:0.5px}
.login-btn:hover{background:var(--green-dark)}
.login-error{font-size:12px;color:var(--red);margin-top:8px;display:none}

/* APP */
#app{display:none}
.topbar{background:#080f0b;border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:14px}
.topbar-logo{width:32px;height:32px;border-radius:50%;object-fit:cover}
.topbar-title{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700}
.topbar-sub{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.topbar-actions{display:flex;gap:8px;align-items:center}
.btn{font-size:12px;font-weight:600;padding:8px 16px;border-radius:6px;cursor:pointer;border:1px solid var(--border-soft);background:var(--card);color:var(--offwhite);transition:all 0.15s}
.btn:hover{background:var(--card2);border-color:var(--border)}
.btn-primary{background:var(--green);border-color:var(--green);color:#fff}
.btn-primary:hover{background:var(--green-dark)}

.content{max-width:1200px;margin:0 auto;padding:24px;display:grid;grid-template-columns:1fr 280px;gap:20px}

/* PRACTICE HEADER */
.practice-header{grid-column:1/-1;background:linear-gradient(135deg,var(--green-deep),var(--green-dark));border:1px solid var(--border);border-radius:12px;padding:20px 24px;display:flex;justify-content:space-between;align-items:flex-start}
.practice-title{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700}
.practice-date{font-size:12px;color:var(--muted);margin-top:3px}
.practice-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.meta-pill{font-size:10px;font-weight:700;padding:3px 10px;border-radius:4px;letter-spacing:1px;text-transform:uppercase}
.pill-green{background:var(--green-dim);color:var(--green);border:1px solid rgba(0,131,72,0.3)}
.pill-amber{background:rgba(245,158,11,0.12);color:var(--amber);border:1px solid rgba(245,158,11,0.2)}
.pill-blue{background:rgba(96,200,250,0.1);color:var(--blue);border:1px solid rgba(96,200,250,0.2)}
.pill-gray{background:rgba(255,255,255,0.06);color:var(--muted);border:1px solid var(--border-soft)}
.pill-coach{background:rgba(96,200,250,0.08);color:var(--blue);border:1px solid rgba(96,200,250,0.15)}
.practice-num{font-family:'Space Grotesk',sans-serif;font-size:56px;font-weight:700;color:rgba(0,131,72,0.25);line-height:1}
.practice-nav{display:flex;gap:8px;align-items:center;margin-bottom:4px}
.p-nav-btn{background:rgba(0,0,0,0.2);border:1px solid var(--border-soft);border-radius:6px;padding:5px 11px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer}
.p-nav-btn:hover{color:var(--offwhite);border-color:var(--border)}
.p-nav-current{font-size:11px;font-weight:700;color:var(--offwhite);padding:0 6px}

/* TIMELINE */
.timeline{display:flex;flex-direction:column;gap:0}
.timeline-row{display:grid;grid-template-columns:54px 4px 1fr;gap:0 14px}
.t-time{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;color:var(--green);text-align:right;padding-top:18px;white-space:nowrap}
.t-line{display:flex;flex-direction:column;align-items:center}
.t-dot{width:11px;height:11px;border-radius:50%;background:var(--green);border:2px solid #080f0b;flex-shrink:0;margin-top:19px;box-shadow:0 0 7px rgba(0,131,72,0.5)}
.t-connector{flex:1;width:2px;background:linear-gradient(to bottom,var(--green),rgba(0,131,72,0.08));min-height:14px}
.timeline-row:last-child .t-connector{display:none}
.t-card{background:var(--card);border:1px solid var(--border-soft);border-radius:10px;padding:13px 15px;margin:8px 0}
.t-card:hover{border-color:var(--border)}
.t-segment-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.t-segment{font-size:9.5px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.t-coach{font-size:10px;font-weight:600;color:var(--blue);background:rgba(96,200,250,0.08);padding:2px 8px;border-radius:4px;border:1px solid rgba(96,200,250,0.15);white-space:nowrap}
.t-title{font-size:14px;font-weight:700;color:var(--offwhite);margin-bottom:8px}
.duration-badge{float:right;font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:var(--green);opacity:0.45}
.t-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
.t-tag{font-size:8px;font-weight:600;padding:1.5px 7px;border-radius:8px;letter-spacing:0.4px;opacity:0.7}
.tag-personnel{background:rgba(96,200,250,0.06);color:rgba(96,200,250,0.8);border:1px solid rgba(96,200,250,0.12)}
.tag-tactical{background:rgba(0,131,72,0.08);color:rgba(0,180,100,0.8);border:1px solid rgba(0,131,72,0.15)}
.tag-skill{background:rgba(245,158,11,0.06);color:rgba(245,158,11,0.8);border:1px solid rgba(245,158,11,0.12)}
.t-focus{font-size:11px;color:var(--muted);font-style:italic;padding:7px 10px;background:rgba(0,131,72,0.06);border-radius:5px;margin-top:6px}

/* SIDEBAR */
.sidebar{display:flex;flex-direction:column;gap:14px}
.side-card{background:var(--card);border:1px solid var(--border-soft);border-radius:10px;overflow:hidden}
.side-header{padding:11px 14px;border-bottom:1px solid var(--border-soft);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:6px}
.side-header::before{content:'';display:block;width:3px;height:12px;background:var(--green);border-radius:2px}
.side-body{padding:10px 14px}
.team-section{margin-bottom:10px}
.team-section:last-child{margin-bottom:0}
.team-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--green);margin-bottom:6px}
.roster-player{display:flex;align-items:center;gap:7px;padding:3.5px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.roster-player:last-child{border-bottom:none}
.r-num{font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;color:var(--green);width:16px;text-align:right;flex-shrink:0}
.r-name{font-size:11px;color:var(--offwhite);flex:1}
.r-status{font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;letter-spacing:0.5px}
.st-avail{background:rgba(74,222,128,0.1);color:#4ade80}
.st-unavail{background:rgba(224,85,85,0.1);color:var(--red)}
.unavail-row .r-name{opacity:0.4;text-decoration:line-through}

/* TIME TRACKING SUMMARY */
.tag-summary-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:11px}
.tag-summary-row:last-child{border-bottom:none}
.ts-name{color:var(--offwhite)}
.ts-val{font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--green)}
.ts-bar-bg{height:3px;background:rgba(255,255,255,0.06);border-radius:2px;margin-top:3px;overflow:hidden}
.ts-bar-fill{height:100%;background:var(--green);border-radius:2px}

/* PRINT STYLES */
/* PRINT — compact one-page layout */
.print-layout{display:none}
@media print {
  body{background:#fff !important;color:#111 !important;font-size:10px}
  #app > .topbar, #login-screen, .content{display:none !important}
  .print-layout{display:block !important}
  @page{margin:1cm;size:A4 portrait}

  .print-header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #111;padding-bottom:6px;margin-bottom:8px}
  .print-title{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:#111}
  .print-date{font-size:10px;color:#555;margin-top:2px}
  .print-meta{display:flex;gap:6px;margin-top:5px}
  .print-pill{font-size:8px;font-weight:700;padding:2px 8px;border:1px solid #999;border-radius:3px;color:#333;text-transform:uppercase;letter-spacing:0.5px}
  .print-num{font-family:'Space Grotesk',sans-serif;font-size:36px;font-weight:700;color:#ddd}

  .print-body{display:grid;grid-template-columns:1fr 150px;gap:12px}
  .print-timeline{display:flex;flex-direction:column;gap:4px}
  .print-row{display:grid;grid-template-columns:32px 1fr;gap:8px;border-bottom:1px solid #eee;padding:4px 0;page-break-inside:avoid}
  .print-time{font-size:9px;font-weight:700;color:#008348;text-align:right}
  .print-seg{font-size:7px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#999}
  .print-drill-title{font-size:10px;font-weight:700;color:#111;display:flex;justify-content:space-between;align-items:baseline}
  .print-coach{font-size:8px;color:#0066aa;font-weight:600}
  .print-tags{font-size:7px;color:#999;margin-top:1px}
  .print-focus{font-size:8.5px;color:#666;font-style:italic;margin-top:2px;line-height:1.3}

  .print-sidebar{border-left:1px solid #ddd;padding-left:10px}
  .print-side-title{font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#008348;margin-bottom:4px;margin-top:8px}
  .print-side-title:first-child{margin-top:0}
  .print-roster-row{font-size:9px;color:#333;padding:1px 0}
  .print-unavail{font-size:8px;color:#c00;padding:1px 0}

  .print-footer{margin-top:10px;border-top:1px solid #ddd;padding-top:4px;font-size:7px;color:#aaa;text-align:right}
}
</style>
</head>

const SHEET_URLS = {"Tags": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQKRFsRCVYbEDikkCWXUjHub2GdNPv3MjlRabHOffhhKixskBbM-L265fHu8j1LH1nEGPYTngmhWe7k/pub?single=true&output=csv&gid=1237659212", "Drill Library": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQKRFsRCVYbEDikkCWXUjHub2GdNPv3MjlRabHOffhhKixskBbM-L265fHu8j1LH1nEGPYTngmhWe7k/pub?single=true&output=csv&gid=677594456", "Practices": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQKRFsRCVYbEDikkCWXUjHub2GdNPv3MjlRabHOffhhKixskBbM-L265fHu8j1LH1nEGPYTngmhWe7k/pub?single=true&output=csv&gid=798917355", "Practice Drills": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQKRFsRCVYbEDikkCWXUjHub2GdNPv3MjlRabHOffhhKixskBbM-L265fHu8j1LH1nEGPYTngmhWe7k/pub?single=true&output=csv&gid=1203589648", "Roster Availability": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQKRFsRCVYbEDikkCWXUjHub2GdNPv3MjlRabHOffhhKixskBbM-L265fHu8j1LH1nEGPYTngmhWe7k/pub?single=true&output=csv&gid=1608493875"};
function csvUrl(sheetName){
  return SHEET_URLS[sheetName];
}

function clean(s){return(s||"").replace(/^"|"$/g,"").trim();}
function parseCSV(text){
  return text.trim().split("\n").map(line=>{
    const cols=[];let cur="",inQ=false;
    for(let i=0;i<line.length;i++){
      if(line[i]==='"'){inQ=!inQ;}
      else if(line[i]===","&&!inQ){cols.push(clean(cur));cur="";}
      else{cur+=line[i];}
    }
    cols.push(clean(cur));return cols;
  });
}

let PRACTICES=[], DRILLS=[], TAGS=[], ROSTER=[], PRACTICE_COLS=[];
let currentIdx=0;

function tryLogin(){
  if(document.getElementById("login-pass").value===PASSWORD){
    document.getElementById("login-screen").style.display="none";
    document.getElementById("app").style.display="block";
    loadAll();
  }else{
    document.getElementById("login-error").style.display="block";
  }
}
document.getElementById("login-pass").addEventListener("keydown",e=>{if(e.key==="Enter")tryLogin();});

async function fetchCSV(sheetName){
  try{
    const res=await fetch(csvUrl(sheetName));
    const text=await res.text();
    return parseCSV(text);
  }catch(e){console.error("Failed to load "+sheetName,e);return [];}
}

async function loadAll(){
  const [practices, drills, tags, roster] = await Promise.all([
    fetchCSV("Practices"),
    fetchCSV("Practice Drills"),
    fetchCSV("Tags"),
    fetchCSV("Roster Availability")
  ]);

  // Practices: header row + data
  const pHeader=practices[0];
  PRACTICES=practices.slice(1).filter(r=>r[0]).map(r=>{
    const o={};pHeader.forEach((h,i)=>o[h]=r[i]||"");return o;
  });

  // Drills
  const dHeader=drills[0];
  DRILLS=drills.slice(1).filter(r=>r[0]).map(r=>{
    const o={};dHeader.forEach((h,i)=>o[h]=r[i]||"");return o;
  });

  // Tags
  const tHeader=tags[0];
  TAGS=tags.slice(1).filter(r=>r[0]&&r[1]).map(r=>{
    const o={};tHeader.forEach((h,i)=>o[h]=r[i]||"");return o;
  });

  // Roster (wide format: player | 142 | 143 | ...)
  const rHeader=roster[0];
  PRACTICE_COLS=rHeader.slice(1); // practice numbers
  ROSTER=roster.slice(1).filter(r=>r[0]&&!r[0].startsWith("KEY")&&!["O","X","I","A","S"].includes(r[0])).map(r=>{
    const o={player:r[0],statuses:{}};
    rHeader.slice(1).forEach((col,i)=>{o.statuses[col]=r[i+1]||"";});
    return o;
  });

  // Find Practice 144 index (or last practice)
  currentIdx=PRACTICES.findIndex(p=>p.practice_num==="144");
  if(currentIdx===-1) currentIdx=PRACTICES.length-1;

  renderPractice();
}

function tagClass(tagName){
  const t=TAGS.find(t=>t.tag===tagName);
  const cat=t?t.category:"";
  if(cat==="Personnel")return "tag-personnel";
  if(cat==="Tactical")return "tag-tactical";
  if(cat==="Skill")return "tag-skill";
  return "tag-tactical";
}

function changePractice(dir){
  const newIdx=currentIdx+dir;
  if(newIdx>=0 && newIdx<PRACTICES.length){
    currentIdx=newIdx;
    renderPractice();
  }
}

function renderPractice(){
  const p=PRACTICES[currentIdx];
  if(!p)return;

  document.getElementById("p-title").textContent="Practice #"+p.practice_num;
  document.getElementById("p-date").textContent=(p.date||"")+" · Week "+(p.week||"");
  document.getElementById("p-num").textContent=p.practice_num;
  document.getElementById("practice-nav-label").textContent="Practice "+p.practice_num;

  // Timeline — drills for this practice
  const practiceDrills=DRILLS.filter(d=>d.practice_num===p.practice_num)
    .sort((a,b)=>parseInt(a.order||0)-parseInt(b.order||0));

  // Calculate total minutes from the segments themselves
  const calcTotalMinutes=practiceDrills.reduce((sum,d)=>sum+(parseInt(d.minutes)||0),0);

  document.getElementById("p-meta").innerHTML=`
    <span class="meta-pill pill-amber">${p.gd_status||""}</span>
    <span class="meta-pill pill-green">${p.load||""}</span>
    <span class="meta-pill pill-blue">${calcTotalMinutes} mins</span>
    <span class="meta-pill pill-coach">👤 ${p.leading_coach||"TBC"}</span>
  `;

  document.getElementById("practice-timeline").innerHTML=practiceDrills.map(d=>{
    const tags=(d["tags (comma separated)"]||"").split(",").map(t=>t.trim()).filter(t=>t);
    const mins=parseInt(d.minutes)||0;
    return `<div class="timeline-row">
      <div class="t-time">${mins>0?mins+"m":""}</div>
      <div class="t-line"><div class="t-dot"></div><div class="t-connector"></div></div>
      <div class="t-card">
        <div class="t-segment-row">
          <div class="t-segment">${d.segment||""}</div>
          <div class="t-coach">👤 ${d.leading_coach||"TBC"}</div>
        </div>
        <div class="t-title"><span class="duration-badge">${mins>0?mins+'<small style="font-size:10px">min</small>':""}</span>${(d["drill_id_or_name"]||"").replace(/\s*\([A-Z]\d{3}\)/g,"")}</div>
        ${tags.length?`<div class="t-tags">${tags.map(t=>`<span class="t-tag ${tagClass(t)}">${t}</span>`).join("")}</div>`:""}
        ${d.focus_note?`<div class="t-focus">🎯 ${d.focus_note}</div>`:""}
      </div>
    </div>`;
  }).join("");

  renderRoster(p.practice_num);
  renderTagSummary();
  buildPrintLayout(p, practiceDrills);
}

function buildPrintLayout(p, drills){
  const teams5=getTeamLists(p,"team_5v5",3);
  const teams4=getTeamLists(p,"team_4v4",4);
  const unavailable=ROSTER.filter(r=>{
    const s=(r.statuses[p.practice_num]||"").toUpperCase();
    return ["X","I","A","S"].includes(s);
  });
  const statusLabel={X:"Not Avail",I:"Injured",A:"Away",S:"Suspended"};

  function teamBlockHtml(teams,sectionLabel){
    if(!teams.length) return `<div class="print-side-title">${sectionLabel}</div><div class="print-roster-row">—</div>`;
    return teams.map(team=>`
      <div class="print-side-title">${sectionLabel} ${team.label}</div>
      ${team.players.map((n,i)=>`<div class="print-roster-row">${i+1}. ${n}</div>`).join("")}
    `).join("");
  }

  const rows=drills.map(d=>{
    const mins=parseInt(d.minutes)||0;
    const tags=(d["tags (comma separated)"]||"").split(",").map(t=>t.trim()).filter(t=>t);
    const cleanTitle=(d["drill_id_or_name"]||"").replace(/\s*\([A-Z]\d{3}\)/g,"");
    return `<div class="print-row">
      <div class="print-time">${mins>0?mins+"'":""}</div>
      <div>
        <div class="print-seg">${d.segment||""}</div>
        <div class="print-drill-title"><span>${cleanTitle}</span><span class="print-coach">${d.leading_coach||""}</span></div>
        ${tags.length?`<div class="print-tags">${tags.join(" · ")}</div>`:""}
        ${d.focus_note?`<div class="print-focus">${d.focus_note}</div>`:""}
      </div>
    </div>`;
  }).join("");

  document.getElementById("print-layout").innerHTML=`
    <div class="print-header">
      <div>
        <div class="print-title">Practice #${p.practice_num}</div>
        <div class="print-date">${p.date||""} · Week ${p.week||""}</div>
        <div class="print-meta">
          <span class="print-pill">${p.gd_status||""}</span>
          <span class="print-pill">${p.load||""}</span>
          <span class="print-pill">${drills.reduce((sum,d)=>sum+(parseInt(d.minutes)||0),0)} mins</span>
          <span class="print-pill">${p.leading_coach||"TBC"}</span>
        </div>
      </div>
      <div class="print-num">${p.practice_num}</div>
    </div>
    <div class="print-body">
      <div class="print-timeline">${rows}</div>
      <div class="print-sidebar">
        ${teamBlockHtml(teams5,"5v5")}
        ${teamBlockHtml(teams4,"4v4")}
        <div class="print-side-title">Unavailable</div>
        ${unavailable.length?unavailable.map(r=>{
          const s=(r.statuses[p.practice_num]||"").toUpperCase();
          return `<div class="print-unavail">${r.player} — ${statusLabel[s]||s}</div>`;
        }).join(""):'<div class="print-roster-row">Everyone available</div>'}
      </div>
    </div>
    <div class="print-footer">Surrey 89ers Basketball — Confidential — Coaching staff use only</div>
  `;
}

function getTeamLists(p, prefix, maxTeams){
  // Returns array of {label, players} for non-empty team columns
  const letters="abcd".slice(0,maxTeams);
  const teams=[];
  for(const letter of letters){
    const key=prefix+"_"+letter;
    const names=(p[key]||"").split(",").map(n=>n.trim()).filter(n=>n);
    if(names.length) teams.push({label:letter.toUpperCase(), players:names});
  }
  return teams;
}

function renderTeamGroup(containerId, teams, emptyMsg){
  const el=document.getElementById(containerId);
  if(!teams.length){
    el.innerHTML=`<div style="font-size:10px;color:var(--muted)">${emptyMsg}</div>`;
    return;
  }
  el.innerHTML=teams.map(team=>`
    <div style="margin-bottom:8px">
      <div style="font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:3px">Team ${team.label}</div>
      ${team.players.map((name,i)=>`
        <div class="roster-player"><span class="r-num">${i+1}</span><span class="r-name">${name}</span></div>
      `).join("")}
    </div>
  `).join("");
}

function renderRoster(practiceNum){
  const p=PRACTICES[currentIdx];

  const teams5=getTeamLists(p,"team_5v5",3);
  const teams4=getTeamLists(p,"team_4v4",4);

  const unavailable=ROSTER.filter(r=>{
    const s=(r.statuses[practiceNum]||"").toUpperCase();
    return ["X","I","A","S"].includes(s);
  });

  const statusLabel={X:"Not Avail",I:"Injured",A:"Away",S:"Suspended"};

  renderTeamGroup("roster-5v5", teams5, "No teams assigned — fill team_5v5_a / b / c in Practices tab");
  renderTeamGroup("roster-4v4", teams4, "No teams assigned — fill team_4v4_a / b / c / d in Practices tab");

  document.getElementById("roster-unavailable").innerHTML=unavailable.length?unavailable.map(r=>{
    const s=(r.statuses[practiceNum]||"").toUpperCase();
    return `<div class="roster-player unavail-row">
      <span class="r-name">${r.player}</span>
      <span class="r-status st-unavail">${statusLabel[s]||s}</span>
    </div>`;
  }).join(""):'<div style="font-size:10px;color:var(--muted)">Everyone available</div>';
}

function renderTagSummary(){
  // Sum minutes per tag across ALL practices
  const tagMinutes={};
  DRILLS.forEach(d=>{
    const mins=parseInt(d.minutes)||0;
    const tags=(d["tags (comma separated)"]||"").split(",").map(t=>t.trim()).filter(t=>t);
    tags.forEach(t=>{
      tagMinutes[t]=(tagMinutes[t]||0)+mins;
    });
  });

  const sorted=Object.entries(tagMinutes).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const max=sorted.length?sorted[0][1]:1;

  document.getElementById("tag-summary").innerHTML=sorted.length?sorted.map(([tag,mins])=>`
    <div class="tag-summary-row" style="flex-direction:column;align-items:stretch">
      <div style="display:flex;justify-content:space-between">
        <span class="ts-name">${tag}</span>
        <span class="ts-val">${mins}m</span>
      </div>
      <div class="ts-bar-bg"><div class="ts-bar-fill" style="width:${(mins/max)*100}%"></div></div>
    </div>
  `).join(""):'<div style="font-size:10px;color:var(--muted)">No tagged drills yet</div>';
}
